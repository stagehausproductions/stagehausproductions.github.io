<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#080A0C"/>
  <!-- Beam cone -->
  <path d="M16 17 L27 29 L5 29 Z" fill="rgba(139,92,246,0.15)"/>
  <!-- Beam edges -->
  <line x1="16" y1="17" x2="5"  y2="29" stroke="rgba(139,92,246,0.5)" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="17" x2="27" y2="29" stroke="rgba(139,92,246,0.5)" stroke-width="1" stroke-linecap="round"/>
  <!-- Stage floor -->
  <line x1="3" y1="29" x2="29" y2="29" stroke="rgba(139,92,246,0.6)" stroke-width="1.25" stroke-linecap="round"/>
  <!-- Diamond housing -->
  <polygon points="16,3 22,9 16,15 10,9"
           fill="rgba(139,92,246,0.2)"
           stroke="#8B5CF6"
           stroke-width="1.75"
           stroke-linejoin="round"/>
  <!-- Inner lens -->
  <polygon points="16,6 19,9 16,12 13,9" fill="#8B5CF6" opacity="0.6"/>
  <!-- Glow -->
  <circle cx="16" cy="9" r="3.5" fill="rgba(196,181,253,0.3)"/>
  <!-- Bright iris -->
  <circle cx="16" cy="9" r="2"   fill="rgba(237,233,254,0.97)"/>
  <!-- White hotspot -->
  <circle cx="16" cy="9" r="1"   fill="#FFFFFF"/>
</svg>
